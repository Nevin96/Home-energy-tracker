spring.application.name=usage-service
service.port=8083

spring.kafka.bootstrap-servers=localhost:9094
spring.kafka.consumer.group-id=usage-service
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.type.mapping=energyUsageEvent:com.nev.kafka.event.EnergyUsageEvent
spring.kafka.consumer.properties.spring.json.value.default.type=com.nev.kafka.event.EnergyUsageEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=com.nev.kafka.event

influx.url=http://localhost:8072
influx.token=my-token
influx.org=nev
influx.bucket=usage-bucket

device.service.url=http://localhost:8081/api/v1/device
user.service.url=http://localhost:8080/api/v1/user
